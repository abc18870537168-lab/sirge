<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统登录 - iPhone 18 系列预测中台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #030710; background-image: radial-gradient(circle at 50% 50%, rgba(0, 243, 255, 0.05), transparent 60%); color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .tech-panel { background: rgba(7, 12, 23, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(0, 243, 255, 0.2); box-shadow: 0 0 30px rgba(0, 243, 255, 0.1); border-radius: 12px; padding: 40px; width: 100%; max-w: 400px; text-align: center; }
        .input-field { width: 100%; padding: 12px; margin-bottom: 20px; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); color: #00f3ff; border-radius: 6px; box-sizing: border-box; transition: all 0.3s; }
        .input-field:focus { outline: none; border-color: #00f3ff; box-shadow: 0 0 10px rgba(0, 243, 255, 0.3); }
        .submit-btn { width: 100%; padding: 12px; background: #00f3ff; color: #000; font-family: 'Orbitron', sans-serif; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; transition: all 0.3s; }
        .submit-btn:hover { background: #fff; box-shadow: 0 0 15px #00f3ff; }
    </style>
</head>
<body>
    <div class="tech-panel">
        <h1 style="font-family: 'Orbitron', sans-serif; font-size: 24px; color: #00f3ff; margin-bottom: 5px; tracking: 2px;">NEXUS-18 CORE</h1>
        <p style="color: gray; font-size: 12px; margin-bottom: 30px;">iPhone 18 系列情报解构中心</p>
        
        {% if error %}
        <p style="color: #ff4444; font-size: 12px; margin-bottom: 15px;">{{ error }}</p>
        {% endif %}
        
        <form method="POST">
            <input type="text" name="username" class="input-field" placeholder="操作员 ID (例如: 演示专家A)" required>
            <input type="password" name="password" class="input-field" placeholder="安全密钥 (例如: 123)" required>
            <button type="submit" class="submit-btn">建立连接 [LINK START]</button>
        </form>
    </div>
</body>
</html>
