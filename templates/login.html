<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>系统登录 - iPhone 18 Pro Max 数据中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 极客风的高级毛玻璃材质 */
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-gray-900 h-screen flex justify-start items-center pl-[12%] bg-[url('/static/login_bg.png')] bg-cover bg-center bg-no-repeat">

    <div class="absolute inset-0 bg-blue-900/20"></div>

    <div class="glass-panel relative z-10 p-10 rounded-2xl shadow-2xl w-[400px]">
        <div class="text-left mb-8">
            <h1 class="text-3xl font-bold text-white mb-2 tracking-wide"> 策略研判平台</h1>
            <p class="text-blue-400 text-sm">欢迎进入预测系统</p>
        </div>

        {% if error %}
        <div class="bg-red-500/20 border border-red-500 text-red-400 text-sm p-3 rounded-lg mb-4 text-center">
            {{ error }}
        </div>
        {% endif %}

        <form action="/" method="POST" class="space-y-6">
            <div>
                <label class="block text-gray-300 text-sm font-bold mb-1">系统账号</label>
                <p class="text-xs text-gray-500 mb-2">格式：英文、数字或中文 (如: 张三)</p>
                <input type="text" name="username" required class="w-full px-4 py-3 rounded-lg bg-gray-900/60 border border-gray-600 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
            </div>

            <div>
                <label class="block text-gray-300 text-sm font-bold mb-1">访问秘钥</label>
                <p class="text-xs text-gray-500 mb-2">格式：至少包含6位字母或数字 (区分大小写)</p>
                <input type="password" name="password" required class="w-full px-4 py-3 rounded-lg bg-gray-900/60 border border-gray-600 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 mt-4 rounded-lg shadow-[0_0_15px_rgba(37,99,235,0.5)] transition-all">
                登 录
            </button>
        </form>

        <p class="text-left text-gray-400 text-sm mt-8 border-t border-gray-700/50 pt-6">
            系统新成员？ <a href="/register" class="text-blue-400 hover:text-blue-300 underline font-bold">申请权限账号</a>
        </p>
    </div>

</body>
</html>
